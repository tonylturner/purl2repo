name: Integration

on:
  workflow_dispatch:
  schedule:
    - cron: "17 8 * * 1"

jobs:
  live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Live integration tests
        run: pytest tests/integration -m integration
