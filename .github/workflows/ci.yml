name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: Python 3.14
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: Ruff format
        run: ruff format --check .
      - name: Mypy
        run: mypy
      - name: Unit tests
        run: pytest
      - name: Build
        run: python -m build
      - name: Smoke test CLI
        run: purl2repo version
