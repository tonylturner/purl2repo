name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  security:
    name: Trivy vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Generate dependency manifest for Trivy
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          mkdir -p .trivy
          python -m pip freeze --all > .trivy/requirements.txt
      - name: Install pinned Trivy CLI
        run: |
          curl -fsSL \
            -o /tmp/trivy.tar.gz \
            https://github.com/aquasecurity/trivy/releases/download/v0.69.3/trivy_0.69.3_Linux-64bit.tar.gz
          echo "1816b632dfe529869c740c0913e36bd1629cb7688bd5634f4a858c1d57c88b75  /tmp/trivy.tar.gz" | sha256sum -c -
          mkdir -p /tmp/trivy-bin
          tar -xzf /tmp/trivy.tar.gz -C /tmp/trivy-bin trivy
          /tmp/trivy-bin/trivy --version
      - name: Trivy Python dependency vulnerability scan
        run: |
          /tmp/trivy-bin/trivy fs \
            --scanners vuln \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            .trivy

  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: Ruff format
        run: ruff format --check .
      - name: Mypy
        run: mypy
      - name: Unit tests
        run: pytest
      - name: Build
        run: python -m build
      - name: Smoke test CLI
        run: purl2repo version
