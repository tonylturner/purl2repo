name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  security:
    name: Trivy vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Generate dependency manifest for Trivy
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          mkdir -p .trivy
          python -m pip freeze --all > .trivy/requirements.txt
      - name: Trivy Python dependency vulnerability scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .trivy
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          format: table
          version: v0.69.3
          skip-dirs: .git,.venv,dist,build

  test:
    name: Python 3.14
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: Ruff format
        run: ruff format --check .
      - name: Mypy
        run: mypy
      - name: Unit tests
        run: pytest
      - name: Build
        run: python -m build
      - name: Smoke test CLI
        run: purl2repo version
